name: Daily GitHub Python Trending Report

# Fetches the hottest Python repo on GitHub daily and emails a report.
#
# Required Secrets (Settings -> Secrets -> Actions):
#   MAIL_USERNAME  - Gmail address (e.g. yourname@gmail.com)
#   MAIL_PASSWORD  - Gmail App Password

on:
  schedule:
    - cron: '0 2 * * *'   # daily UTC 02:00 (Beijing 10:00)
  workflow_dispatch:
    inputs:
      since:
        description: 'Trending window in days (1 = today, 7 = this week)'
        required: false
        default: '1'

concurrency:
  group: github-python-daily
  cancel-in-progress: true

jobs:
  send-report:
    name: Fetch trending repo and send report
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Fetch hottest Python repo on GitHub
        id: trending
        env:
          GH_TOKEN:   ${{ secrets.GITHUB_TOKEN }}
          SINCE_DAYS: ${{ github.event.inputs.since || '1' }}
        run: |
          SINCE_DATE=$(date -d "${SINCE_DAYS} days ago" +%Y-%m-%d)
          echo "Searching Python repos created since $SINCE_DATE ..."

          curl -s \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/search/repositories?q=language:python+created:>${SINCE_DATE}&sort=stars&order=desc&per_page=5" \
            -o /tmp/gh_result.json

          COUNT=$(python3 -c "import json; print(json.load(open('/tmp/gh_result.json')).get('total_count', 0))" || echo "0")
          if [ "$COUNT" -eq 0 ]; then
            echo "No results, broadening to 7 days..."
            SINCE_DATE=$(date -d "7 days ago" +%Y-%m-%d)
            curl -s \
              -H "Authorization: Bearer ${GH_TOKEN}" \
              -H "Accept: application/vnd.github+json" \
              "https://api.github.com/search/repositories?q=language:python+pushed:>${SINCE_DATE}&sort=stars&order=desc&per_page=5" \
              -o /tmp/gh_result.json
          fi

          python3 scripts/fetch_trending.py

      - name: Fetch README and build report
        id: report
        run: |
          curl -sf "${{ steps.trending.outputs.readme_url }}" \
            | head -c 6000 > /tmp/readme.txt || echo "(No README available)" > /tmp/readme.txt

          python3 - <<'EOF'
          import os

          name   = "${{ steps.trending.outputs.name }}"
          desc   = "${{ steps.trending.outputs.desc }}"
          stars  = "${{ steps.trending.outputs.stars }}"
          url    = "${{ steps.trending.outputs.url }}"
          topics = "${{ steps.trending.outputs.topics }}"

          readme = open("/tmp/readme.txt").read()

          report = f"""
          ========================================
          Daily GitHub Python Trending Report
          {os.popen("date '+%Y-%m-%d'").read().strip()}
          ========================================

          Repository : {name}
          Stars      : {stars}
          URL        : {url}
          Description: {desc}
          Topics     : {topics or "N/A"}

          ----------------------------------------
          README
          ----------------------------------------
          {readme}
          """

          open("/tmp/report.txt", "w").write(report)
          print(report[:300])
          EOF

      - name: Send report by email
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port:    465
          secure:         true
          username:       ${{ secrets.MAIL_USERNAME }}
          password:       ${{ secrets.MAIL_PASSWORD }}
          subject:        "Daily Python Trending: ${{ steps.trending.outputs.name }} (stars: ${{ steps.trending.outputs.stars }})"
          to:             e0134091@u.nus.edu
          from:           "GitHub Trending Bot <${{ secrets.MAIL_USERNAME }}>"
          body:           file:///tmp/report.txt
