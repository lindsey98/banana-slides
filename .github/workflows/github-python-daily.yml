name: Daily GitHub Python Trending Slides

# Runs daily, fetches the hottest Python repo on GitHub,
# generates a slide deck with banana-slides, and emails it.
#
# Required Secrets (Settings -> Secrets -> Actions):
#   OPENAI_API_KEY  - OpenAI-compatible API key
#   OPENAI_API_BASE - API base URL (optional, defaults to https://aihubmix.com/v1)
#   MAIL_USERNAME   - Gmail address
#   MAIL_PASSWORD   - Gmail App Password
# Optional Variables:
#   AI_PROVIDER_FORMAT - openai / gemini (default: openai)

on:
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:
    inputs:
      language:
        description: 'Output language: en / zh / ja'
        required: false
        default: 'en'
      since:
        description: 'Trending window in days (1 = today, 7 = this week)'
        required: false
        default: '1'

concurrency:
  group: github-python-daily
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  generate-slides:
    name: Fetch trending repo and generate slides
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Create .env file
        env:
          OPENAI_API_KEY:  ${{ secrets.OPENAI_API_KEY }}
          OPENAI_API_BASE: ${{ secrets.OPENAI_API_BASE }}
          GOOGLE_API_KEY:  ${{ secrets.GOOGLE_API_KEY }}
        run: |
          cat > .env << EOF
          AI_PROVIDER_FORMAT=gemini
          GOOGLE_API_KEY=${GOOGLE_API_KEY}
          OPENAI_API_KEY=${OPENAI_API_KEY}
          OPENAI_API_BASE=${OPENAI_API_BASE:-https://api.openai.com/v1}
          TEXT_MODEL=gpt-4o
          IMAGE_MODEL=nano-banana-pro
          SECRET_KEY=github-actions-daily-slides
          OUTPUT_LANGUAGE=${{ github.event.inputs.language || 'en' }}
          BACKEND_PORT=5000
          FLASK_ENV=production
          EOF

      - name: Build and start backend
        run: |
          docker compose up -d backend
          echo "Waiting for backend..."
          for i in $(seq 1 30); do
            if curl -sf http://localhost:5000/health > /dev/null; then
              echo "Backend ready (attempt $i)"
              break
            fi
            if [ "$i" -eq 30 ]; then
              echo "Backend failed to start"
              docker compose logs backend
              exit 1
            fi
            echo "Waiting $i/30..."
            sleep 5
          done

      - name: Fetch hottest Python repo on GitHub
        id: trending
        env:
          GH_TOKEN:   ${{ secrets.GITHUB_TOKEN }}
          SINCE_DAYS: ${{ github.event.inputs.since || '1' }}
        run: |
          SINCE_DATE=$(date -d "${SINCE_DAYS} days ago" +%Y-%m-%d)
          echo "Searching Python repos created since $SINCE_DATE ..."

          curl -s \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/search/repositories?q=language:python+created:>${SINCE_DATE}&sort=stars&order=desc&per_page=5" \
            -o /tmp/gh_result.json

          COUNT=$(python3 -c "import json; print(json.load(open('/tmp/gh_result.json')).get('total_count', 0))" || echo "0")
          if [ "$COUNT" -eq 0 ]; then
            echo "No results for today, broadening to 7 days..."
            SINCE_DATE=$(date -d "7 days ago" +%Y-%m-%d)
            curl -s \
              -H "Authorization: Bearer ${GH_TOKEN}" \
              -H "Accept: application/vnd.github+json" \
              "https://api.github.com/search/repositories?q=language:python+pushed:>${SINCE_DATE}&sort=stars&order=desc&per_page=5" \
              -o /tmp/gh_result.json
          fi

          cat /tmp/gh_result.json | python3 -c "import sys,json; d=json.load(sys.stdin); print('total_count:', d.get('total_count'))"
          python3 scripts/fetch_trending.py

      - name: Fetch README
        run: |
          curl -sf "${{ steps.trending.outputs.readme_url }}" \
            | head -c 4000 > /tmp/repo_readme.txt || echo "" > /tmp/repo_readme.txt

      - name: Install Python dependencies
        run: pip3 install requests --quiet

      - name: Generate slides
        run: |
          DATE_TAG=$(date +%Y-%m-%d)
          SAFE_NAME=$(echo "${{ steps.trending.outputs.name }}" | tr '/' '-')
          OUTPUT_PATH="daily-slides/${DATE_TAG}-${SAFE_NAME}.pptx"
          mkdir -p daily-slides

          python3 scripts/generate_trending_slides.py \
            --repo    "${{ steps.trending.outputs.name }}" \
            --desc    "${{ steps.trending.outputs.desc }}" \
            --stars   "${{ steps.trending.outputs.stars }}" \
            --url     "${{ steps.trending.outputs.url }}" \
            --topics  "${{ steps.trending.outputs.topics }}" \
            --readme  /tmp/repo_readme.txt \
            --lang    "${{ github.event.inputs.language || 'en' }}" \
            --output  "${OUTPUT_PATH}"

          echo "OUTPUT_PATH=${OUTPUT_PATH}" >> $GITHUB_ENV
          echo "SAFE_NAME=${SAFE_NAME}"     >> $GITHUB_ENV

      - name: Commit slides to repository
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add daily-slides/
          git diff --cached --quiet && echo "Nothing to commit" && exit 0
          git commit -m "Daily slides: ${{ steps.trending.outputs.name }} (stars: ${{ steps.trending.outputs.stars }})"
          git push

      - name: Upload PPTX artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: daily-slides-${{ env.SAFE_NAME }}
          path: daily-slides/
          retention-days: 30

      - name: Email slides
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port:    465
          secure:         true
          username:       ${{ secrets.MAIL_USERNAME }}
          password:       ${{ secrets.MAIL_PASSWORD }}
          subject:        "Daily Slides - ${{ steps.trending.outputs.name }} (stars: ${{ steps.trending.outputs.stars }})"
          to:             e0134091@u.nus.edu
          from:           "banana-slides bot <${{ secrets.MAIL_USERNAME }}>"
          body: |
            Hi,

            Here is today's auto-generated slide deck for the hottest GitHub Python repository!

            Repository : ${{ steps.trending.outputs.name }}
            Stars      : ${{ steps.trending.outputs.stars }}
            URL        : ${{ steps.trending.outputs.url }}
            Description: ${{ steps.trending.outputs.desc }}
            Topics     : ${{ steps.trending.outputs.topics }}

            The PPTX is attached. Enjoy!

            Generated by banana-slides
            Run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          attachments: ${{ env.OUTPUT_PATH }}

      - name: Show backend logs on failure
        if: failure()
        run: docker compose logs backend --tail=100
