name: Daily GitHub Python Trending Report

on:
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:

concurrency:
  group: github-python-daily
  cancel-in-progress: true

jobs:
  send-report:
    name: Fetch trending repos and send report
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install dependencies
        run: pip install requests beautifulsoup4 --quiet

      - name: Generate trending report
        id: report
        run: |
          python3 scripts/generate_report.py /tmp/report.txt $GITHUB_OUTPUT
          echo "--- Preview ---"
          head -20 /tmp/report.txt

      - name: Send report by email
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port:    465
          secure:         true
          username:       ${{ secrets.MAIL_USERNAME }}
          password:       ${{ secrets.MAIL_PASSWORD }}
          subject:        "🐍 Python Trending: ${{ steps.report.outputs.top_name }} (+${{ steps.report.outputs.top_stars }} stars this week)"
          to:             e0134091@u.nus.edu
          from:           "GitHub Trending Bot <${{ secrets.MAIL_USERNAME }}>"
          body:           file:///tmp/report.txt
